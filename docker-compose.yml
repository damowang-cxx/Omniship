services:
  postgres:
    image: postgres:16
    container_name: omniship-poc-postgres
    environment:
      POSTGRES_DB: omniship_poc
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d omniship_poc"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:

